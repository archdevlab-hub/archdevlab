<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eğitim Kutusu - YKS Rehber</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f14;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: #1c1c26;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
}

button {
  background: #4caf50;
  color: white;
  cursor: pointer;
}

/* 🔥 EĞİTİM DASHBOARD */
.education-card {
  background: #2a2a38;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.title {
  font-size: 18px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.card {
  background: #1c1c26;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}

.bar {
  height: 10px;
  background: #333;
  border-radius: 5px;
  margin-top: 10px;
  overflow: hidden;
}

.fill {
  height: 10px;
  background: #4caf50;
  width: 0%;
}

.task {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  padding: 10px;
  background: #2a2a38;
  border-radius: 5px;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>Eğitim Kutusu</h1>
  <p>YKS çalışma planı sistemi</p>
</header>

<div class="container">

<div class="education-card">
  <div class="title">📚 Günlük Eğitim Planı</div>
  <div class="subtitle">
    Bu sistem sana sadece görev değil, çalışma yönü verir.
  </div>

  <label>Günlük çalışma saati</label>
  <input type="number" id="hours" />

  <label>Ders seç</label>
  <select id="subject">
    <option>Matematik</option>
    <option>Türkçe</option>
    <option>Fen</option>
    <option>Sosyal</option>
  </select>

  <button onclick="generatePlan()">Plan Oluştur</button>
</div>

<div class="card" id="result"></div>

</div>

<script>

let tasks = [];
let todayKey = getTodayKey();

function getTodayKey() {
  let d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function generatePlan() {
  let hours = Number(document.getElementById("hours").value);
  let subject = document.getElementById("subject").value;

  if (!hours || hours <= 0) {
    alert("Geçerli saat gir");
    return;
  }

  tasks = [
    { type:"📖 Konu", text: `${subject} konu çalışması - ${Math.floor(hours*0.3)} saat`, done:false },
    { type:"❓ Soru", text: `Soru çözümü - ${Math.floor(hours*0.5)} saat`, done:false },
    { type:"🔁 Tekrar", text: `Tekrar + analiz - ${Math.floor(hours*0.2)} saat`, done:false }
  ];

  save();
  render();
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

function save() {
  localStorage.setItem("yks_" + todayKey, JSON.stringify(tasks));
}

function load() {
  let data = localStorage.getItem("yks_" + todayKey);
  if (data) tasks = JSON.parse(data);
}

function progress() {
  if (tasks.length === 0) return 0;
  let done = tasks.filter(t => t.done).length;
  return Math.round((done / tasks.length) * 100);
}

function render() {

  let p = progress();

  let html = `
    <div class="education-card">
      <div class="title">📊 Günlük Durum: %${p}</div>
      <div class="subtitle">
        ${p === 100 ? "Bugünkü plan tamamlandı 🎯" : "Plan üzerinde çalışıyorsun 🚀"}
      </div>

      <div class="bar">
        <div class="fill" style="width:${p}%"></div>
      </div>
    </div>
  `;

  if (tasks.length === 0) {
    html += `<p>Henüz plan yok. Yukarıdan oluştur.</p>`;
  } else {
    tasks.forEach((t,i) => {
      html += `
        <div class="task ${t.done ? "done":""}">
          <span>${t.type} - ${t.text}</span>
          <button onclick="toggleTask(${i})">
            ${t.done ? "Undo" : "Done"}
          </button>
        </div>
      `;
    });
  }

  document.getElementById("result").innerHTML = html;
}

load();
render();

</script>

</body>
</html>
