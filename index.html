<!DOCTYPE html>  <html lang="tr">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>ArchDevLab - v6.4 Architect</title>  
  <style>  
    :root {  
      --bg-main: #0f0f14; --bg-card: #1c1c26; --bg-input: #13131f; --bg-accent: #2a2a38;  
      --color-success: #4caf50; --color-info: #2196f3; --color-warning: #ff9800; --color-danger: #e81123;  
      --color-text: #ffffff; --border-color: #3a3a4a;  
    }  
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: white; }  
    header { text-align: center; padding: 20px; background: var(--bg-card); border-bottom: 2px solid var(--bg-accent); }  .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 800px; margin: 40px auto; padding: 0 20px; }  
.tile { background: var(--bg-card); padding: 20px; border-radius: 10px; cursor: pointer; border: 1px solid var(--bg-accent); transition: 0.3s; text-align: center; }  
.tile:hover { transform: translateY(-4px); background: #222230; }  
.tile-icon { font-size: 28px; margin-bottom: 10px; }  
.tile-title { font-weight: bold; font-size: 14px; }  
  
.window-panel { display: none; max-width: 600px; margin: 20px auto; background: var(--bg-card); border-radius: 10px; padding: 20px; border: 1px solid var(--border-color); }  
.close-btn { background: var(--color-danger); border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

  </style>  
</head>  
<body>    <header><h1>ARCHDEVLAB</h1></header>    <!-- ANA MENÜ -->    <div class="main-grid" id="tilesGrid">  
    <div class="tile" data-target="edu-box"><div class="tile-icon">📚</div><div class="tile-title">Eğitim Kutusu</div></div>  
    <div class="tile" data-target="net-box"><div class="tile-icon">🧮</div><div class="tile-title">Net Hesaplayıcı</div></div>  
    <div class="tile"><div class="tile-icon">🎯</div><div class="tile-title">Sıralama</div></div>  
    <div class="tile"><div class="tile-icon">⚙️</div><div class="tile-title">Ayarlar</div></div>  
  </div>    <!-- MODÜL PENCERELERİ -->    <div id="edu-box" class="window-panel">  
    <div style="display:flex; justify-content:space-between;"> <span>📚 Eğitim Modülü</span> <button class="close-btn" data-target="edu-box">✕</button></div>  
    <div id="task-list"></div>  
  </div>    <div id="net-box" class="window-panel">  
    <div style="display:flex; justify-content:space-between;"> <span>🧮 Net Hesaplayıcı</span> <button class="close-btn" data-target="net-box">✕</button></div>  
    <p>Buraya net hesaplama formlarını ekleyeceğiz.</p>  
  </div>    <script>  
    // Dinamik UI Controller  
    const UI = {  
      init() {  
        document.querySelectorAll('.tile[data-target]').forEach(t => {  
          t.addEventListener('click', () => this.toggle(t.dataset.target, true));  
        });  
        document.querySelectorAll('.close-btn').forEach(b => {  
          b.addEventListener('click', () => this.toggle(b.dataset.target, false));  
        });  
      },  
      toggle(id, show) {  
        document.getElementById(id).style.display = show ? 'block' : 'none';  
        document.getElementById('tilesGrid').style.display = show ? 'none' : 'grid';  
      }  
    };  
    document.addEventListener('DOMContentLoaded', () => UI.init());  
  </script>  </body>  
</html>
